services:
  postgres:
    image: postgres:16-alpine
    container_name: achados-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: achados
      POSTGRES_PASSWORD: achados
      POSTGRES_DB: achados_perdidos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U achados -d achados_perdidos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
